<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test carte</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">

  <div id="cartes" class="flex flex-wrap gap-4 justify-center p-8"></div>

  <script>
    const sb = supabase.createClient(
      'https://zbyvhlhnjefpodjdnfdy.supabase.co',
      'sb_publishable_6rBnjr2X1LV9wGTNkVl6jQ_XxHENZ-l'
    )

    async function load() {
      const { data } = await sb.from("cartes").select("*")

      data.forEach(carte => {
        document.getElementById("cartes").innerHTML += `
          <div class="bg-gray-800 rounded-xl p-4 w-48 text-center">
            <img src="${carte.image_url}" class="w-full rounded-lg mb-2">
            <p class="font-bold">${carte.nom}</p>
            <p class="text-yellow-400 text-sm">Rareté ${carte.rarete}</p>
          </div>
        `
      })
    }

    load()
  </script>
</body>
</html>
