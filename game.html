<script>
const supabase = supabase.createClient(
  'https://zbyvhlhnjefpodjdnfdy.supabase.co',
  'sb_publishable_6rBnjr2X1LV9wGTNkVl6jQ_XxHENZ-l'
)

let clicks = 0
let totalScore = 0
let lastSavedClicks = 0
let userId = null
let saveTimeout = null

// ────────────────────────────────────────────────
// CHARGEMENT DES DONNÉES AU DÉMARRAGE
// ────────────────────────────────────────────────
async function load() {
  const { data: { user }, error: authError } = await supabase.auth.getUser()
  
  if (authError || !user) {
    window.location.href = "index.html"
    return
  }

  userId = user.id

  // Récupération progression + pseudo
  const { data: progress, error } = await supabase
    .from("player_progress")
    .select("click_count, total_score, gacha_points, pity_counter, last_click")
    .eq("user_id", userId)
    .maybeSingle()   // .maybeSingle() → gère le cas "pas de ligne" sans erreur

  let pseudo = user.user_metadata?.pseudo || user.email?.split('@')[0] || "Joueur"

  if (error) {
    console.error("Erreur lecture progression :", error)
    document.getElementById("welcome").textContent = "Erreur de chargement..."
    return
  }

  if (!progress) {
    // Première fois → création de la ligne
    const { error: insertError } = await supabase
      .from("player_progress")
      .insert({
        user_id: userId,
        click_count: 0,
        total_score: 0,
        gacha_points: 0,
        pity_counter: 0,
        last_click: new Date().toISOString(),
        updated_at: new Date().toISOString()
      })

    if (insertError) {
      console.error("Erreur création progression :", insertError)
      document.getElementById("welcome").textContent = "Erreur d'initialisation..."
      return
    }

    clicks = 0
    totalScore = 0
  } else {
    clicks = Number(progress.click_count) || 0
    totalScore = Number(progress.total_score) || 0
  }

  lastSavedClicks = clicks

  // Mise à jour interface
  document.getElementById("score").textContent = clicks
  document.getElementById("profileScore").textContent = clicks
  document.getElementById("welcome").textContent = `Salut ${pseudo} !`
}

// ────────────────────────────────────────────────
// ÉVÉNEMENTS INTERFACE
// ────────────────────────────────────────────────
document.getElementById("profileBtn").onclick = () => {
  document.getElementById("profileMenu").classList.toggle("hidden")
}

document.getElementById("logoutMenu").onclick = 
document.getElementById("logout").onclick = async () => {
  await supabase.auth.signOut()
  window.location.href = "index.html"
}

// ────────────────────────────────────────────────
// SAUVEGARDE OPTIMISÉE
// ────────────────────────────────────────────────
async function saveProgress() {
  if (clicks === lastSavedClicks) return false

  const delta = clicks - lastSavedClicks
  totalScore += delta

  const { error } = await supabase
    .from("player_progress")
    .update({
      click_count: clicks,
      total_score: totalScore,
      last_click: new Date().toISOString(),
      updated_at: new Date().toISOString()
    })
    .eq("user_id", userId)

  if (error) {
    console.error("Échec sauvegarde :", error.message)
    return false
  }

  lastSavedClicks = clicks
  return true
}

// Clic principal
document.getElementById("click").onclick = () => {
  clicks++
  document.getElementById("score").textContent = clicks
  document.getElementById("profileScore").textContent = clicks

  clearTimeout(saveTimeout)
  saveTimeout = setTimeout(saveProgress, 1800)  // ~2 secondes d'inactivité
}

// Sauvegarde périodique (sécurité supplémentaire)
setInterval(saveProgress, 7000)

// Tentative de sauvegarde à la fermeture / rechargement
window.addEventListener('beforeunload', () => {
  if (clicks !== lastSavedClicks) {
    saveProgress()  // version synchrone limitée, mais mieux que rien
    // Pour une vraie fiabilité : envisager une Edge Function + sendBeacon plus tard
  }
})

// Lancement
load()
</script>
