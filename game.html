<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gacha Clicker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #18181f;
      --surface3: #1e1e28;
      --border: #2a2a3a;
      --border-bright: #3a3a50;
      --accent: #6c63ff;
      --accent-dim: rgba(108, 99, 255, 0.1);
      --accent-hover: #8a83ff;
      --purple: #7c3aed;
      --purple-bright: #9d5fff;
      --text: #a0a0b8;
      --text-dim: #50506a;
      --text-bright: #e8e8f0;
      --gold: #d4a84b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle radial glow top center */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(108, 99, 255, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .layout {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* HEADER */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(10, 10, 15, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 28px;
      z-index: 100;
    }

    .header-logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-bright);
      letter-spacing: 2px;
    }

    .header-logo span {
      color: var(--accent);
    }

    .header-line {
      flex: 1;
    }

    .header-user {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    /* TOP RIGHT */
    .top-right {
      position: fixed;
      top: 68px;
      right: 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .nav-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.15s;
      border-radius: 6px;
    }

    .nav-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* PANELS */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      width: 240px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .panel-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .panel-label {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      margin-bottom: 3px;
    }

    .panel-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      color: var(--text-bright);
      margin-bottom: 12px;
    }

    .panel-value.gold { color: var(--gold); }

    .hidden { display: none !important; }

    .logout-btn {
      width: 100%;
      padding: 8px;
      background: transparent;
      border: 1px solid rgba(180, 60, 60, 0.3);
      border-radius: 6px;
      color: rgba(200, 80, 80, 0.8);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.15s;
    }

    .logout-btn:hover {
      border-color: #cc4444;
      color: #ff6666;
      background: rgba(180, 40, 40, 0.1);
    }

    /* MAIN CARD */
    .main-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      margin-top: 56px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    /* SCORE */
    .score-block { margin-bottom: 40px; }

    .score-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
    }

    .score-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 48px;
      font-weight: 400;
      color: var(--text-bright);
      line-height: 1;
    }

    .score-divider {
      height: 1px;
      background: var(--border);
      margin: 12px 0;
    }

    .score-total {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--gold);
      letter-spacing: 1px;
    }

    /* VIAL */
    .vial-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      user-select: none;
    }

    .vial-container {
      position: relative;
      width: 100%;
      height: 72px;
    }

    .vial-svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 12px rgba(124, 58, 237, 0.25));
      transition: filter 0.3s;
    }

    .vial-wrapper:hover:not(.on-cooldown) .vial-svg {
      filter: drop-shadow(0 0 20px rgba(157, 95, 255, 0.4));
    }

    .vial-btn {
      width: 100%;
      padding: 12px;
      background: var(--surface2);
      border: 1px solid var(--border-bright);
      border-radius: 8px;
      color: var(--text-bright);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1px;
      transition: all 0.15s;
      text-align: center;
    }

    .vial-wrapper:hover:not(.on-cooldown) .vial-btn {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .vial-wrapper.on-cooldown {
      cursor: not-allowed;
    }

    .vial-wrapper.on-cooldown .vial-btn {
      color: var(--text-dim);
      border-color: var(--border);
      background: var(--surface);
    }

    #vialWave1, #vialWave2 {
      animation: vialWave 4s linear infinite;
    }

    #vialWave2 {
      animation-duration: 6s;
      animation-direction: reverse;
      opacity: 0.6;
    }

    @keyframes vialWave {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* LEADERBOARD */
    #leaderboardPanel {
      max-height: 360px;
      overflow-y: auto;
    }

    #leaderboardPanel::-webkit-scrollbar { width: 3px; }
    #leaderboardPanel::-webkit-scrollbar-track { background: transparent; }
    #leaderboardPanel::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

    .lb-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 6px;
      border-radius: 6px;
      margin-bottom: 2px;
      font-size: 13px;
      transition: background 0.1s;
    }

    .lb-row:hover { background: var(--surface2); }
    .lb-row.me-row { background: rgba(108, 99, 255, 0.08); }

    .lb-rank { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); width: 28px; }
    .lb-name { flex: 1; color: var(--text); font-weight: 500; font-size: 13px; }
    .lb-name.me { color: var(--accent); }
    .lb-score { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--gold); }
  </style>
</head>
<body>

  <div class="header">
    <span class="header-logo">Gacha<span>Clicker</span></span>
    <div class="header-line"></div>
    <span class="header-user" id="headerUsername">—</span>
  </div>

  <div class="top-right">
    <button class="nav-btn" id="profileBtn">👤 Profile</button>
    <div class="panel hidden" id="profileMenu">
      <div class="panel-title">Player</div>
      <div class="panel-label">Username</div>
      <div class="panel-value" id="profileName">—</div>
      <div class="panel-label">Current Score</div>
      <div class="panel-value" id="profileScore">0</div>
      <div class="panel-label">All-Time Total</div>
      <div class="panel-value gold" id="profileTotal">0</div>
      <button class="logout-btn" id="logoutMenu">Disconnect</button>
    </div>

    <button class="nav-btn" id="leaderboardBtn">🏆 Leaderboard</button>
    <div class="panel hidden" id="leaderboardMenu">
      <div class="panel-title">Top 50</div>
      <div id="leaderboardPanel">
        <p style="font-size: 12px; color: var(--text-dim); text-align: center; padding: 16px 0;">Loading...</p>
      </div>
    </div>
  </div>

  <div class="layout">
    <div class="main-card">

      <div class="score-block">
        <div class="score-label">Score</div>
        <div class="score-value" id="score">0</div>
        <div class="score-divider"></div>
        <div class="score-total">ALL-TIME &nbsp;·&nbsp; <span id="totalEver">0</span></div>
      </div>

      <div class="vial-wrapper" id="clickBtn">
        <div class="vial-container">
          <svg class="vial-svg" viewBox="0 0 400 72" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <clipPath id="vialClip">
                <rect x="4" y="4" width="392" height="64" rx="12" ry="12"/>
              </clipPath>
              <linearGradient id="liquidGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#7c3aed"/>
                <stop offset="100%" stop-color="#3b0764"/>
              </linearGradient>
              <linearGradient id="glassShine" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="rgba(255,255,255,0.05)"/>
                <stop offset="100%" stop-color="rgba(0,0,0,0.15)"/>
              </linearGradient>
            </defs>

            <g clip-path="url(#vialClip)">
              <rect id="vialLiquid" x="0" y="72" width="400" height="72" fill="url(#liquidGrad)"/>
              <g id="vialWave1">
                <ellipse cx="100" cy="0" rx="200" ry="9" fill="#7c3aed"/>
                <ellipse cx="300" cy="0" rx="200" ry="9" fill="#7c3aed"/>
              </g>
              <g id="vialWave2">
                <ellipse cx="100" cy="0" rx="200" ry="7" fill="#9d5fff"/>
                <ellipse cx="300" cy="0" rx="200" ry="7" fill="#9d5fff"/>
              </g>
            </g>

            <rect x="4" y="4" width="392" height="64" rx="12" ry="12"
              fill="none" stroke="#3a3a50" stroke-width="1.5"/>

            <rect x="4" y="4" width="392" height="64" rx="12" ry="12"
              fill="url(#glassShine)"/>
          </svg>
        </div>
        <div class="vial-btn" id="vialLabel">Execute</div>
      </div>

    </div>
  </div>

  <script>
    const sb = supabase.createClient(
      'https://zbyvhlhnjefpodjdnfdy.supabase.co',
      'sb_publishable_6rBnjr2X1LV9wGTNkVl6jQ_XxHENZ-l'
    )

    let clicks = 0
    let totalEver = 0
    let username = 'Player'
    let userId = null
    let saveTimeout = null
    let onCooldown = false

    const COOLDOWN = 3000

    function updateDisplay() {
      document.getElementById("score").textContent = clicks.toLocaleString()
      document.getElementById("totalEver").textContent = totalEver.toLocaleString()
      document.getElementById("profileScore").textContent = clicks.toLocaleString()
      document.getElementById("profileTotal").textContent = totalEver.toLocaleString()
    }

    function setLiquidLevel(percent) {
      const liquid = document.getElementById("vialLiquid")
      const wave1 = document.getElementById("vialWave1")
      const wave2 = document.getElementById("vialWave2")
      const yPos = 72 - (percent * 77)
      liquid.setAttribute("y", yPos)
      wave1.setAttribute("transform", `translate(0, ${yPos})`)
      wave2.setAttribute("transform", `translate(0, ${yPos - 5})`)
    }

    function startCooldown() {
      onCooldown = true
      document.getElementById("clickBtn").classList.add("on-cooldown")
      document.getElementById("vialLabel").textContent = "Recharging..."

      const drainStart = performance.now()

      function drainAnimate(now) {
        const progress = Math.min((now - drainStart) / 400, 1)
        setLiquidLevel(1 - (1 - Math.pow(1 - progress, 3)))
        if (progress < 1) requestAnimationFrame(drainAnimate)
        else startRefill()
      }

      requestAnimationFrame(drainAnimate)
    }

    function startRefill() {
      const refillStart = performance.now()

      function refillAnimate(now) {
        const progress = Math.min((now - refillStart) / COOLDOWN, 1)
        setLiquidLevel(progress * 1.05)
        if (progress < 1) {
          requestAnimationFrame(refillAnimate)
        } else {
          onCooldown = false
          document.getElementById("clickBtn").classList.remove("on-cooldown")
          document.getElementById("vialLabel").textContent = "Execute"
          setLiquidLevel(1.05)
        }
      }

      requestAnimationFrame(refillAnimate)
    }

    async function loadLeaderboard() {
      const panel = document.getElementById("leaderboardPanel")
      panel.innerHTML = '<p style="font-size: 12px; color: var(--text-dim); text-align: center; padding: 16px 0;">Loading...</p>'

      const { data } = await sb
        .from("player_scores")
        .select("username, clicks")
        .order("clicks", { ascending: false })
        .limit(50)

      if (!data || data.length === 0) {
        panel.innerHTML = '<p style="font-size: 12px; color: var(--text-dim); text-align: center; padding: 16px 0;">No players yet</p>'
        return
      }

      const medals = ["🥇", "🥈", "🥉"]
      panel.innerHTML = data.map((joueur, index) => {
        const isMe = joueur.username === username
        const rank = medals[index] || `#${index + 1}`
        return `
          <div class="lb-row ${isMe ? 'me-row' : ''}">
            <span class="lb-rank">${rank}</span>
            <span class="lb-name ${isMe ? 'me' : ''}">${joueur.username}</span>
            <span class="lb-score">${joueur.clicks.toLocaleString()}</span>
          </div>
        `
      }).join("")
    }

    async function load() {
      const { data: { user } } = await sb.auth.getUser()
      if (!user) { window.location.href = "index.html"; return }
      userId = user.id

      const { data } = await sb
        .from("player_scores")
        .select("clicks, total_clicks_ever, username")
        .eq("user_id", userId)
        .single()

      if (!data) {
        const urlParams = new URLSearchParams(window.location.search)
        const pseudoFromUrl = urlParams.get('pseudo')
        const defaultName = pseudoFromUrl || user.email.split("@")[0]
        await sb.from("player_scores").insert({
          user_id: userId,
          clicks: 0,
          total_clicks_ever: 0,
          username: defaultName
        })
        clicks = 0
        totalEver = 0
        username = defaultName
      } else {
        clicks = data.clicks || 0
        totalEver = data.total_clicks_ever || 0
        username = data.username || 'Player'
      }

      document.getElementById("profileName").textContent = username
      document.getElementById("headerUsername").textContent = username
      updateDisplay()
      setLiquidLevel(1.05)
    }

    async function saveScore() {
      if (!userId) return
      await sb
        .from("player_scores")
        .update({ clicks, total_clicks_ever: totalEver, updated_at: new Date() })
        .eq("user_id", userId)
    }

    document.getElementById("clickBtn").onclick = function () {
      if (onCooldown) return
      clicks++
      totalEver++
      updateDisplay()
      startCooldown()
      if (saveTimeout) clearTimeout(saveTimeout)
      saveTimeout = setTimeout(saveScore, 2000)
    }

    document.getElementById("profileBtn").onclick = () => {
      document.getElementById("profileMenu").classList.toggle("hidden")
      document.getElementById("leaderboardMenu").classList.add("hidden")
    }

    document.getElementById("leaderboardBtn").onclick = () => {
      const menu = document.getElementById("leaderboardMenu")
      menu.classList.toggle("hidden")
      document.getElementById("profileMenu").classList.add("hidden")
      if (!menu.classList.contains("hidden")) loadLeaderboard()
    }

    document.getElementById("logoutMenu").onclick = async function () {
      await saveScore()
      await sb.auth.signOut()
      location.href = "index.html"
    }

    window.addEventListener("beforeunload", saveScore)
    load()
  </script>
</body>
</html>
