<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gacha Clicker - Jeu</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="bg-gray-900 text-white min-h-screen p-6">

<h1 class="text-4xl font-bold text-center mb-8">Gacha Clicker</h1>

<!-- Menu Profil en haut à droite -->
<div class="absolute top-6 right-6">
  <button id="profileBtn" class="bg-gray-700 px-4 py-2 rounded hover:bg-gray-600">
    Profil
  </button>

  <div id="profileMenu" class="hidden bg-gray-800 p-4 rounded shadow-lg mt-2 text-white w-48">
    <p><strong>Pseudo :</strong> <span id="profileName">...</span></p>
    <p><strong>Score actuel :</strong> <span id="profileScore">0</span></p>
    <button id="logoutMenu" class="mt-3 w-full py-2 bg-red-600 rounded hover:bg-red-700">
      Déconnexion
    </button>
  </div>
</div>

<div class="max-w-md mx-auto bg-gray-800 p-8 rounded-xl">

<p id="welcome" class="text-xl mb-6 text-center">Chargement...</p>

<div class="text-2xl mb-4">
Score : <span id="score">0</span>
</div>

<button id="click" class="w-full py-6 bg-purple-700 rounded-xl text-3xl font-bold mb-6 hover:bg-purple-600">
Clique.
</button>

<button id="logout" class="w-full py-3 bg-red-600 rounded hover:bg-red-700">
Déconnexion
</button>

</div>

<script>

const supabaseClient = supabase.createClient(
  'https://zbyvhlhnjefpodjdnfdy.supabase.co',
  'sb_publishable_6rBnjr2X1LV9wGTNkVl6jQ_XxHENZ-l'
)

let clicks = 0
let userId = null
let pseudo = null

async function load(){

  const { data } = await supabaseClient.auth.getUser()
  const user = data?.user

  if(!user){
    window.location.href = "index.html"
    return
  }

  userId = user.id

  // récupérer progression joueur
  let { data: progress } = await supabaseClient
    .from("player_progress")
    .select("click_count,pseudo")
    .eq("user_id", userId)
    .single()

  // si le joueur n'existe pas encore, créer l'entrée
  if(!progress){
    progress = {
      click_count: 0,
      pseudo: ""
    }
    await supabaseClient
      .from("player_progress")
      .insert({
        user_id: userId,
        click_count: 0,
        pseudo: ""
      })
  }

  clicks = progress.click_count || 0
  document.getElementById("score").textContent = clicks

  // si le pseudo n'est pas encore défini, demander au joueur
  if(!progress.pseudo){
    pseudo = prompt("Bienvenue ! Choisis ton pseudo :","Joueur")
    if(!pseudo) pseudo = "Joueur"
    await supabaseClient
      .from("player_progress")
      .update({ pseudo: pseudo })
      .eq("user_id", userId)
  } else {
    pseudo = progress.pseudo
  }

  document.getElementById("welcome").textContent = `Salut ${pseudo} !`

  // afficher dans le menu profil
  loadProfile()
}

// Afficher le menu quand on clique sur le bouton Profil
document.getElementById("profileBtn").onclick = function() {
  const menu = document.getElementById("profileMenu");
  menu.classList.toggle("hidden");
}

// Charger les infos du profil
function loadProfile(){
  document.getElementById("profileName").textContent = pseudo
  document.getElementById("profileScore").textContent = clicks
}

// Déconnexion depuis le menu
document.getElementById("logoutMenu").onclick = function() {
  supabaseClient.auth.signOut().then(()=>{
    location.href = "index.html";
  })
}

// Déconnexion bouton principal
document.getElementById("logout").onclick = function(){
  supabaseClient.auth.signOut().then(()=>{
    location.href = "index.html"
  })
}

// Gestion du click
document.getElementById("click").onclick = async function(){

  clicks++
  document.getElementById("score").textContent = clicks
  document.getElementById("profileScore").textContent = clicks

  await supabaseClient
    .from("player_progress")
    .update({
      click_count: clicks,
      last_click: new Date(),
      updated_at: new Date()
    })
    .eq("user_id", userId)
}

load()

</script>

</body>
</html>
