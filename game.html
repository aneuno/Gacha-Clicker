<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gacha Clicker - Game</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    #clickBtn {
      position: relative;
      overflow: hidden;
      z-index: 0;
    }

    #clickBtn span {
      position: relative;
      z-index: 2;
    }

    #liquidFill {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 0%;
      background: linear-gradient(180deg, #6d28d9, #4c1d95);
      z-index: 1;
      will-change: height;
    }

    #liquidFill::before {
      content: '';
      position: absolute;
      top: -12px;
      left: -50%;
      width: 200%;
      height: 25px;
      background: #6d28d9;
      border-radius: 45%;
      animation: wave 4s linear infinite;
    }

    #liquidFill::after {
      content: '';
      position: absolute;
      top: -8px;
      left: -50%;
      width: 200%;
      height: 20px;
      background: #7c3aed;
      border-radius: 40%;
      animation: wave 6s linear infinite reverse;
      opacity: 0.6;
    }

    @keyframes wave {
      0%   { transform: translateX(0) translateZ(0); }
      100% { transform: translateX(-50%) translateZ(0); }
    }

    #clickBtn.on-cooldown {
      cursor: not-allowed;
    }

    #leaderboardPanel {
      max-height: 400px;
      overflow-y: auto;
    }

    #leaderboardPanel::-webkit-scrollbar {
      width: 4px;
    }

    #leaderboardPanel::-webkit-scrollbar-thumb {
      background: #6d28d9;
      border-radius: 2px;
    }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen p-6">
  <h1 class="text-4xl font-bold text-center mb-8">Gacha Clicker</h1>

  <div class="absolute top-6 right-6 flex flex-col items-end gap-2">

    <button id="profileBtn" class="bg-gray-700 px-4 py-2 rounded hover:bg-gray-600">👤 Profile</button>
    <div id="profileMenu" class="hidden bg-gray-800 p-4 rounded shadow-lg text-white w-56">
      <p class="text-lg font-bold mb-2">👤 <span id="profileName">...</span></p>
      <hr class="border-gray-600 mb-2">
      <p class="text-sm text-gray-400">Current score</p>
      <p class="text-xl font-bold mb-2"><span id="profileScore">0</span> clicks</p>
      <p class="text-sm text-gray-400">Total since the beginning</p>
      <p class="text-xl font-bold text-yellow-400 mb-4"><span id="profileTotal">0</span> clicks</p>
      <button id="logoutMenu" class="w-full py-2 bg-red-600 rounded hover:bg-red-700">Logout</button>
    </div>

    <button id="leaderboardBtn" class="bg-gray-700 px-4 py-2 rounded hover:bg-gray-600">🏆 Leaderboard</button>
    <div id="leaderboardMenu" class="hidden bg-gray-800 p-4 rounded shadow-lg text-white w-64">
      <p class="text-lg font-bold mb-3 text-center">🏆 ScoreBoard 🏆</p>
      <div id="leaderboardPanel">
        <p class="text-gray-400 text-center text-sm">Loading...</p>
      </div>
    </div>

  </div>

  <div class="max-w-md mx-auto bg-gray-800 p-8 rounded-xl">
    <div class="text-2xl mb-1">Score : <span id="score">0</span></div>
    <div class="text-sm text-yellow-400 mb-6">All-time total : <span id="totalEver">0</span> clicks</div>
    <button id="clickBtn" class="w-full py-6 bg-gray-700 rounded-xl text-3xl font-bold mb-6">
      <span>Click.</span>
      <div id="liquidFill"></div>
    </button>
  </div>

  <script>
    const sb = supabase.createClient(
      'https://zbyvhlhnjefpodjdnfdy.supabase.co',
      'sb_publishable_6rBnjr2X1LV9wGTNkVl6jQ_XxHENZ-l'
    )

    let clicks = 0
    let totalEver = 0
    let username = 'Player'
    let userId = null
    let saveTimeout = null
    let onCooldown = false

    const COOLDOWN = 3000

    function updateDisplay() {
      document.getElementById("score").textContent = clicks
      document.getElementById("totalEver").textContent = totalEver
      document.getElementById("profileScore").textContent = clicks
      document.getElementById("profileTotal").textContent = totalEver
    }

    function startCooldown() {
      onCooldown = true
      const btn = document.getElementById("clickBtn")
      const fill = document.getElementById("liquidFill")

      btn.classList.add("on-cooldown")

      fill.style.transition = "height 0.4s cubic-bezier(0.4, 0, 0.2, 1)"
      fill.style.height = "0%"

      setTimeout(() => {
        fill.style.transition = `height ${COOLDOWN}ms linear`
        fill.style.height = "110%"
      }, 450)

      setTimeout(() => {
        onCooldown = false
        btn.classList.remove("on-cooldown")
      }, 450 + COOLDOWN)
    }

    async function loadLeaderboard() {
      const panel = document.getElementById("leaderboardPanel")
      panel.innerHTML = '<p class="text-gray-400 text-center text-sm">Loading...</p>'

      const { data } = await sb
        .from("player_scores")
        .select("username, clicks")
        .order("clicks", { ascending: false })
        .limit(50)

      if (!data || data.length === 0) {
        panel.innerHTML = '<p class="text-gray-400 text-center text-sm">No players yet</p>'
        return
      }

      const medals = ["🥇", "🥈", "🥉"]

      panel.innerHTML = data.map((joueur, index) => {
        const rank = index + 1
        const isMe = joueur.username === username
        const medal = medals[index] || `#${rank}`

        return `
          <div class="flex justify-between items-center py-2 px-2 rounded mb-1 ${isMe ? 'bg-purple-900' : 'hover:bg-gray-700'}">
            <span class="text-sm">${medal} <span class="font-bold ${isMe ? 'text-purple-300' : ''}">${joueur.username}</span></span>
            <span class="text-yellow-400 text-sm font-bold">${joueur.clicks.toLocaleString()}</span>
          </div>
        `
      }).join("")
    }

    async function load() {
      const { data: { user } } = await sb.auth.getUser()
      if (!user) { window.location.href = "index.html"; return }
      userId = user.id

      const { data } = await sb
        .from("player_scores")
        .select("clicks, total_clicks_ever, username")
        .eq("user_id", userId)
        .single()

      if (!data) {
        const urlParams = new URLSearchParams(window.location.search)
        const pseudoFromUrl = urlParams.get('pseudo')
        const defaultName = pseudoFromUrl || user.email.split("@")[0]

        await sb.from("player_scores").insert({
          user_id: userId,
          clicks: 0,
          total_clicks_ever: 0,
          username: defaultName
        })
        clicks = 0
        totalEver = 0
        username = defaultName
      } else {
        clicks = data.clicks || 0
        totalEver = data.total_clicks_ever || 0
        username = data.username || 'Player'
      }

      document.getElementById("profileName").textContent = username
      updateDisplay()

      const fill = document.getElementById("liquidFill")
      fill.style.transition = "none"
      fill.style.height = "110%"
    }

    async function saveScore() {
      if (!userId) return
      await sb
        .from("player_scores")
        .update({
          clicks: clicks,
          total_clicks_ever: totalEver,
          updated_at: new Date()
        })
        .eq("user_id", userId)
    }

    document.getElementById("clickBtn").onclick = function () {
      if (onCooldown) return

      clicks++
      totalEver++
      updateDisplay()
      startCooldown()

      if (saveTimeout) clearTimeout(saveTimeout)
      saveTimeout = setTimeout(saveScore, 2000)
    }

    document.getElementById("profileBtn").onclick = () => {
      document.getElementById("profileMenu").classList.toggle("hidden")
      document.getElementById("leaderboardMenu").classList.add("hidden")
    }

    document.getElementById("leaderboardBtn").onclick = () => {
      const menu = document.getElementById("leaderboardMenu")
      menu.classList.toggle("hidden")
      document.getElementById("profileMenu").classList.add("hidden")
      if (!menu.classList.contains("hidden")) {
        loadLeaderboard()
      }
    }

    document.getElementById("logoutMenu").onclick = async function () {
      await saveScore()
      await sb.auth.signOut()
      location.href = "index.html"
    }

    window.addEventListener("beforeunload", saveScore)

    load()
  </script>
</body>
</html>
