<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gacha Clicker - Jeu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-6">
  <h1 class="text-4xl font-bold text-center mb-8">Gacha Clicker</h1>

  <div class="absolute top-6 right-6">
    <button id="profileBtn" class="bg-gray-700 px-4 py-2 rounded hover:bg-gray-600">Profil</button>
    <div id="profileMenu" class="hidden bg-gray-800 p-4 rounded shadow-lg mt-2 text-white w-48">
      <p><strong>Score actuel :</strong> <span id="profileScore">0</span></p>
      <button id="logoutMenu" class="mt-3 w-full py-2 bg-red-600 rounded hover:bg-red-700">Déconnexion</button>
    </div>
  </div>

  <div class="max-w-md mx-auto bg-gray-800 p-8 rounded-xl">
    <p id="welcome" class="text-xl mb-6 text-center">Chargement...</p>
    <div class="text-2xl mb-4">Score : <span id="score">0</span></div>
    <button id="click" class="w-full py-6 bg-purple-700 rounded-xl text-3xl font-bold mb-6 hover:bg-purple-600">Clique.</button>
    <button id="logout" class="w-full py-3 bg-red-600 rounded hover:bg-red-700">Déconnexion</button>
  </div>

  <script>
    const supabaseClient = supabase.createClient(
      'https://zbyvhlhnjefpodjdnfdy.supabase.co',
      'sb_publishable_6rBnjr2X1LV9wGTNkVl6jQ_XxHENZ-l'
    )

    let clicks = 0
    let userId = null
    let saveTimeout = null

    // ⬇️ Change ici si nom différent
    const TABLE = 'users data'
    const COLUMN = 'click'

    function updateDisplay() {
      document.getElementById("score").textContent = clicks
      document.getElementById("profileScore").textContent = clicks
    }

    async function load() {
      const { data } = await supabaseClient.auth.getUser()
      const user = data?.user

      if (!user) {
        window.location.href = "index.html"
        return
      }

      userId = user.id

      // Récupère le score du joueur connecté
      const { data: row, error } = await supabaseClient
        .from(TABLE)
        .select(COLUMN)
        .eq("user_id", userId)
        .single()

      if (error || !row) {
        // Première connexion : crée la ligne
        await supabaseClient
          .from(TABLE)
          .insert({ user_id: userId, [COLUMN]: 0 })
        clicks = 0
      } else {
        clicks = row[COLUMN] || 0
      }

      updateDisplay()
      document.getElementById("welcome").textContent = "Salut Joueur !"
    }

    async function saveScore() {
      if (!userId) return

      const { error } = await supabaseClient
        .from(TABLE)
        .update({ [COLUMN]: clicks })
        .eq("user_id", userId)

      if (error) console.error("Erreur sauvegarde :", error)
    }

    // Sauvegarde aussi quand le joueur quitte la page
    window.addEventListener("beforeunload", () => {
      saveScore()
    })

    document.getElementById("profileBtn").onclick = function () {
      document.getElementById("profileMenu").classList.toggle("hidden")
    }

    document.getElementById("logoutMenu").onclick = async function () {
      await saveScore()
      await supabaseClient.auth.signOut()
      location.href = "index.html"
    }

    document.getElementById("logout").onclick = async function () {
      await saveScore()
      await supabaseClient.auth.signOut()
      location.href = "index.html"
    }

    document.getElementById("click").onclick = function () {
      clicks++
      updateDisplay()

      // Sauvegarde 2 secondes après le dernier clic
      if (saveTimeout) clearTimeout(saveTimeout)
      saveTimeout = setTimeout(saveScore, 2000)
    }

    load()
  </script>
</body>
</html>
