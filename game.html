<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gacha Clicker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #18181f;
      --surface3: #1e1e28;
      --border: #2a2a3a;
      --border-bright: #3a3a50;
      --accent: #6c63ff;
      --accent-dim: rgba(108, 99, 255, 0.1);
      --accent-hover: #8a83ff;
      --purple: #7c3aed;
      --purple-bright: #9d5fff;
      --text: #a0a0b8;
      --text-dim: #50506a;
      --text-bright: #e8e8f0;
      --gold: #d4a84b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(108, 99, 255, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .layout {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* HEADER */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(10, 10, 15, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 28px;
      z-index: 100;
    }

    .header-logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-bright);
      letter-spacing: 2px;
    }

    .header-logo span { color: var(--accent); }

    .header-line { flex: 1; }

    .header-user {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    /* TOP RIGHT */
    .top-right {
      position: fixed;
      top: 68px;
      right: 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .nav-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.15s;
      border-radius: 6px;
    }

    .nav-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* PANELS */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      width: 240px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .panel-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .panel-label {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      margin-bottom: 3px;
    }

    .panel-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      color: var(--text-bright);
      margin-bottom: 12px;
    }

    .panel-value.gold { color: var(--gold); }

    .hidden { display: none !important; }

    .logout-btn {
      width: 100%;
      padding: 8px;
      background: transparent;
      border: 1px solid rgba(180, 60, 60, 0.3);
      border-radius: 6px;
      color: rgba(200, 80, 80, 0.8);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.15s;
    }

    .logout-btn:hover {
      border-color: #cc4444;
      color: #ff6666;
      background: rgba(180, 40, 40, 0.1);
    }

    /* MAIN CARD */
    .main-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      margin-top: 56px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    /* SCORE */
    .score-block { margin-bottom: 40px; }

    .score-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
    }

    .score-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 48px;
      font-weight: 400;
      color: var(--text-bright);
      line-height: 1;
    }

    .score-divider {
      height: 1px;
      background: var(--border);
      margin: 12px 0;
    }

    .score-total {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--gold);
      letter-spacing: 1px;
    }

    /* CLICK BUTTON avec animation vague CSS */
    #clickBtn {
      position: relative;
      overflow: hidden;
      width: 100%;
      padding: 28px;
      background: var(--surface2);
      border: 1px solid var(--border-bright);
      border-radius: 10px;
      color: var(--text-bright);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    #clickBtn:hover:not(.on-cooldown) {
      border-color: var(--accent);
      color: var(--accent);
    }

    #clickBtn.on-cooldown {
      cursor: not-allowed;
      color: var(--text-dim);
      border-color: var(--border);
    }

    #clickBtn span {
      position: relative;
      z-index: 2;
    }

    #liquidFill {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 0%;
      background: linear-gradient(180deg, #6d28d9, #4c1d95);
      z-index: 1;
      will-change: height;
    }

    #liquidFill::before {
      content: '';
      position: absolute;
      top: -12px;
      left: -50%;
      width: 200%;
      height: 25px;
      background: #6d28d9;
      border-radius: 45%;
      animation: wave 4s linear infinite;
    }

    #liquidFill::after {
      content: '';
      position: absolute;
      top: -8px;
      left: -50%;
      width: 200%;
      height: 20px;
      background: #7c3aed;
      border-radius: 40%;
      animation: wave 6s linear infinite reverse;
      opacity: 0.6;
    }

    @keyframes wave {
      0%   { transform: translateX(0) translateZ(0); }
      100% { transform: translateX(-50%) translateZ(0); }
    }

    /* LEADERBOARD */
    #leaderboardPanel {
      max-height: 360px;
      overflow-y: auto;
    }

    #leaderboardPanel::-webkit-scrollbar { width: 3px; }
    #leaderboardPanel::-webkit-scrollbar-track { background: transparent; }
    #leaderboardPanel::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

    .lb-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 6px;
      border-radius: 6px;
      margin-bottom: 2px;
      font-size: 13px;
      transition: background 0.1s;
    }

    .lb-row:hover { background: var(--surface2); }
    .lb-row.me-row { background: rgba(108, 99, 255, 0.08); }

    .lb-rank { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); width: 28px; }
    .lb-name { flex: 1; color: var(--text); font-weight: 500; font-size: 13px; }
    .lb-name.me { color: var(--accent); }
    .lb-score { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--gold); }
  </style>
</head>
<body>

  <div class="header">
    <span class="header-logo">Gacha<span>Clicker</span></span>
    <div class="header-line"></div>
    <span class="header-user" id="headerUsername">—</span>
  </div>

  <div class="top-right">
    <button class="nav-btn" id="profileBtn">👤 Profile</button>
    <div class="panel hidden" id="profileMenu">
      <div class="panel-title">Player</div>
      <div class="panel-label">Username</div>
      <div class="panel-value" id="profileName">—</div>
      <div class="panel-label">Current Score</div>
      <div class="panel-value" id="profileScore">0</div>
      <div class="panel-label">All-Time Total</div>
      <div class="panel-value gold" id="profileTotal">0</div>
      <button class="logout-btn" id="logoutMenu">Disconnect</button>
    </div>

    <button class="nav-btn" id="leaderboardBtn">🏆 Leaderboard</button>
    <div class="panel hidden" id="leaderboardMenu">
      <div class="panel-title">Top 50</div>
      <div id="leaderboardPanel">
        <p style="font-size: 12px; color: var(--text-dim); text-align: center; padding: 16px 0;">Loading...</p>
      </div>
    </div>
  </div>

  <div class="layout">
    <div class="main-card">

      <div class="score-block">
        <div class="score-label">Score</div>
        <div class="score-value" id="score">0</div>
        <div class="score-divider"></div>
        <div class="score-total">ALL-TIME &nbsp;·&nbsp; <span id="totalEver">0</span></div>
      </div>

      <button id="clickBtn">
        <span>Execute</span>
        <div id="liquidFill"></div>
      </button>

    </div>
  </div>

  <script>
    const sb = supabase.createClient(
      'https://zbyvhlhnjefpodjdnfdy.supabase.co',
      'sb_publishable_6rBnjr2X1LV9wGTNkVl6jQ_XxHENZ-l'
    )

    let clicks = 0
    let totalEver = 0
    let username = 'Player'
    let userId = null
    let saveTimeout = null
    let onCooldown = false

    const COOLDOWN = 3000

    function updateDisplay() {
      document.getElementById("score").textContent = clicks.toLocaleString()
      document.getElementById("totalEver").textContent = totalEver.toLocaleString()
      document.getElementById("profileScore").textContent = clicks.toLocaleString()
      document.getElementById("profileTotal").textContent = totalEver.toLocaleString()
    }

    function startCooldown() {
      onCooldown = true
      const btn = document.getElementById("clickBtn")
      const fill = document.getElementById("liquidFill")

      btn.classList.add("on-cooldown")

      fill.style.transition = "height 0.4s cubic-bezier(0.4, 0, 0.2, 1)"
      fill.style.height = "0%"

      setTimeout(() => {
        fill.style.transition = `height ${COOLDOWN}ms linear`
        fill.style.height = "110%"
      }, 450)

      setTimeout(() => {
        onCooldown = false
        btn.classList.remove("on-cooldown")
      }, 450 + COOLDOWN)
    }

    async function loadLeaderboard() {
      const panel = document.getElementById("leaderboardPanel")
      panel.innerHTML = '<p style="font-size: 12px; color: var(--text-dim); text-align: center; padding: 16px 0;">Loading...</p>'

      const { data } = await sb
        .from("player_scores")
        .select("username, clicks")
        .order("clicks", { ascending: false })
        .limit(50)

      if (!data || data.length === 0) {
        panel.innerHTML = '<p style="font-size: 12px; color: var(--text-dim); text-align: center; padding: 16px 0;">No players yet</p>'
        return
      }

      const medals = ["🥇", "🥈", "🥉"]
      panel.innerHTML = data.map((joueur, index) => {
        const isMe = joueur.username === username
        const rank = medals[index] || `#${index + 1}`
        return `
          <div class="lb-row ${isMe ? 'me-row' : ''}">
            <span class="lb-rank">${rank}</span>
            <span class="lb-name ${isMe ? 'me' : ''}">${joueur.username}</span>
            <span class="lb-score">${joueur.clicks.toLocaleString()}</span>
          </div>
        `
      }).join("")
    }

    async function load() {
      const { data: { user } } = await sb.auth.getUser()
      if (!user) { window.location.href = "index.html"; return }
      userId = user.id

      const { data } = await sb
        .from("player_scores")
        .select("clicks, total_clicks_ever, username")
        .eq("user_id", userId)
        .single()

      if (!data) {
        const urlParams = new URLSearchParams(window.location.search)
        const pseudoFromUrl = urlParams.get('pseudo')
        const defaultName = pseudoFromUrl || user.email.split("@")[0]
        await sb.from("player_scores").insert({
          user_id: userId,
          clicks: 0,
          total_clicks_ever: 0,
          username: defaultName
        })
        clicks = 0
        totalEver = 0
        username = defaultName
      } else {
        clicks = data.clicks || 0
        totalEver = data.total_clicks_ever || 0
        username = data.username || 'Player'
      }

      document.getElementById("profileName").textContent = username
      document.getElementById("headerUsername").textContent = username
      updateDisplay()

      const fill = document.getElementById("liquidFill")
      fill.style.transition = "none"
      fill.style.height = "110%"
    }

    async function saveScore() {
      if (!userId) return
      await sb
        .from("player_scores")
        .update({ clicks, total_clicks_ever: totalEver, updated_at: new Date() })
        .eq("user_id", userId)
    }

    document.getElementById("clickBtn").onclick = function () {
      if (onCooldown) return
      clicks++
      totalEver++
      updateDisplay()
      startCooldown()
      if (saveTimeout) clearTimeout(saveTimeout)
      saveTimeout = setTimeout(saveScore, 2000)
    }

    document.getElementById("profileBtn").onclick = () => {
      document.getElementById("profileMenu").classList.toggle("hidden")
      document.getElementById("leaderboardMenu").classList.add("hidden")
    }

    document.getElementById("leaderboardBtn").onclick = () => {
      const menu = document.getElementById("leaderboardMenu")
      menu.classList.toggle("hidden")
      document.getElementById("profileMenu").classList.add("hidden")
      if (!menu.classList.contains("hidden")) loadLeaderboard()
    }

    document.getElementById("logoutMenu").onclick = async function () {
      await saveScore()
      await sb.auth.signOut()
      location.href = "index.html"
    }

    window.addEventListener("beforeunload", saveScore)
    load()
  </script>
</body>
</html>
