<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gacha Clicker</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #080a0c;
      --surface: #0d1117;
      --surface2: #111820;
      --border: #1e2d3d;
      --border-bright: #2a4a6b;
      --accent: #4a9eff;
      --accent-dim: #1a3a5c;
      --purple: #7c3aed;
      --purple-bright: #9d5fff;
      --text: #c8d8e8;
      --text-dim: #4a6a8a;
      --text-bright: #e8f4ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(74, 158, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74, 158, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Corner decorations */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 300px; height: 300px;
      background: radial-gradient(circle at top left, rgba(74, 158, 255, 0.04), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .layout {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 100;
    }

    .header-logo {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .header-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border) 0%, transparent 100%);
      margin: 0 24px;
    }

    /* Top right buttons */
    .top-right {
      position: fixed;
      top: 60px;
      right: 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .nav-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 6px 14px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    }

    .nav-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* Dropdown panels */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 16px;
      width: 240px;
      position: relative;
    }

    .panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .panel-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .panel-label {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .panel-value {
      font-family: 'Share Tech Mono', monospace;
      font-size: 18px;
      color: var(--text-bright);
      margin-bottom: 10px;
    }

    .panel-value.gold {
      color: #c8a84b;
    }

    .hidden { display: none !important; }

    /* Logout button */
    .logout-btn {
      width: 100%;
      padding: 8px;
      background: transparent;
      border: 1px solid #3a1a1a;
      color: #8a3a3a;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      border-color: #cc3333;
      color: #cc3333;
      background: rgba(204, 51, 51, 0.08);
    }

    /* Main click area */
    .main-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      margin-top: 48px;
    }

    .main-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    /* Corner brackets */
    .corner {
      position: absolute;
      width: 12px; height: 12px;
    }
    .corner-tl { top: -1px; left: -1px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
    .corner-tr { top: -1px; right: -1px; border-top: 2px solid var(--accent); border-right: 2px solid var(--accent); }
    .corner-bl { bottom: -1px; left: -1px; border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent); }
    .corner-br { bottom: -1px; right: -1px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }

    /* Score display */
    .score-block {
      margin-bottom: 32px;
    }

    .score-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .score-value {
      font-family: 'Share Tech Mono', monospace;
      font-size: 36px;
      color: var(--text-bright);
      line-height: 1;
    }

    .score-total {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: #c8a84b;
      margin-top: 6px;
      letter-spacing: 1px;
    }

    /* Click button */
    #clickBtn {
      position: relative;
      overflow: hidden;
      width: 100%;
      padding: 28px;
      background: var(--surface2);
      border: 1px solid var(--border-bright);
      color: var(--text-bright);
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      letter-spacing: 6px;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      clip-path: polygon(16px 0%, 100% 0%, calc(100% - 16px) 100%, 0% 100%);
    }

    #clickBtn:hover:not(.on-cooldown) {
      border-color: var(--purple-bright);
      color: var(--purple-bright);
    }

    #clickBtn.on-cooldown {
      cursor: not-allowed;
      color: var(--text-dim);
      border-color: var(--border);
    }

    #clickBtn span {
      position: relative;
      z-index: 2;
    }

    #liquidFill {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%;
      height: 0%;
      background: linear-gradient(180deg, #5b21b6, #3b0764);
      z-index: 1;
      will-change: height;
    }

    #liquidFill::before {
      content: '';
      position: absolute;
      top: -12px; left: -50%;
      width: 200%; height: 25px;
      background: #6d28d9;
      border-radius: 45%;
      animation: wave 4s linear infinite;
    }

    #liquidFill::after {
      content: '';
      position: absolute;
      top: -8px; left: -50%;
      width: 200%; height: 20px;
      background: #7c3aed;
      border-radius: 40%;
      animation: wave 6s linear infinite reverse;
      opacity: 0.6;
    }

    @keyframes wave {
      0%   { transform: translateX(0) translateZ(0); }
      100% { transform: translateX(-50%) translateZ(0); }
    }

    /* Leaderboard */
    #leaderboardPanel {
      max-height: 380px;
      overflow-y: auto;
    }

    #leaderboardPanel::-webkit-scrollbar { width: 3px; }
    #leaderboardPanel::-webkit-scrollbar-track { background: var(--surface); }
    #leaderboardPanel::-webkit-scrollbar-thumb { background: var(--accent-dim); }

    .lb-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .lb-row:last-child { border-bottom: none; }

    .lb-rank {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      width: 28px;
    }

    .lb-name {
      flex: 1;
      color: var(--text);
      font-weight: 500;
    }

    .lb-name.me { color: var(--accent); }

    .lb-score {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: #c8a84b;
    }

    .lb-row.me-row {
      background: rgba(74, 158, 255, 0.05);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span class="header-logo">Gacha Clicker</span>
    <div class="header-line"></div>
    <span style="font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 2px;" id="headerUsername"></span>
  </div>

  <!-- Top right -->
  <div class="top-right">
    <button class="nav-btn" id="profileBtn">[ Profile ]</button>
    <div class="panel hidden" id="profileMenu">
      <div class="panel-title">// Player Data</div>
      <div class="panel-label">Username</div>
      <div class="panel-value" id="profileName">—</div>
      <div class="panel-label">Current Score</div>
      <div class="panel-value" id="profileScore">0</div>
      <div class="panel-label">All-Time Total</div>
      <div class="panel-value gold" id="profileTotal">0</div>
      <button class="logout-btn" id="logoutMenu">[ Disconnect ]</button>
    </div>

    <button class="nav-btn" id="leaderboardBtn">[ Leaderboard ]</button>
    <div class="panel hidden" id="leaderboardMenu">
      <div class="panel-title">// Top 50 Rankings</div>
      <div id="leaderboardPanel">
        <p style="font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--text-dim); text-align: center; padding: 12px 0;">Loading...</p>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="layout">
    <div class="main-card">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>

      <div class="score-block">
        <div class="score-label">// Score</div>
        <div class="score-value" id="score">0</div>
        <div class="score-total">ALL-TIME : <span id="totalEver">0</span></div>
      </div>

      <button id="clickBtn">
        <span>Execute</span>
        <div id="liquidFill"></div>
      </button>
    </div>
  </div>

  <script>
    const sb = supabase.createClient(
      'https://zbyvhlhnjefpodjdnfdy.supabase.co',
      'sb_publishable_6rBnjr2X1LV9wGTNkVl6jQ_XxHENZ-l'
    )

    let clicks = 0
    let totalEver = 0
    let username = 'Player'
    let userId = null
    let saveTimeout = null
    let onCooldown = false

    const COOLDOWN = 3000

    function updateDisplay() {
      document.getElementById("score").textContent = clicks.toLocaleString()
      document.getElementById("totalEver").textContent = totalEver.toLocaleString()
      document.getElementById("profileScore").textContent = clicks.toLocaleString()
      document.getElementById("profileTotal").textContent = totalEver.toLocaleString()
    }

    function startCooldown() {
      onCooldown = true
      const btn = document.getElementById("clickBtn")
      const fill = document.getElementById("liquidFill")

      btn.classList.add("on-cooldown")

      fill.style.transition = "height 0.4s cubic-bezier(0.4, 0, 0.2, 1)"
      fill.style.height = "0%"

      setTimeout(() => {
        fill.style.transition = `height ${COOLDOWN}ms linear`
        fill.style.height = "110%"
      }, 450)

      setTimeout(() => {
        onCooldown = false
        btn.classList.remove("on-cooldown")
      }, 450 + COOLDOWN)
    }

    async function loadLeaderboard() {
      const panel = document.getElementById("leaderboardPanel")
      panel.innerHTML = '<p style="font-family: \'Share Tech Mono\', monospace; font-size: 11px; color: var(--text-dim); text-align: center; padding: 12px 0;">Loading...</p>'

      const { data } = await sb
        .from("player_scores")
        .select("username, clicks")
        .order("clicks", { ascending: false })
        .limit(50)

      if (!data || data.length === 0) {
        panel.innerHTML = '<p style="font-family: \'Share Tech Mono\', monospace; font-size: 11px; color: var(--text-dim); text-align: center; padding: 12px 0;">No data</p>'
        return
      }

      const medals = ["🥇", "🥈", "🥉"]

      panel.innerHTML = data.map((joueur, index) => {
        const isMe = joueur.username === username
        const rank = medals[index] || `#${index + 1}`
        return `
          <div class="lb-row ${isMe ? 'me-row' : ''}">
            <span class="lb-rank">${rank}</span>
            <span class="lb-name ${isMe ? 'me' : ''}">${joueur.username}</span>
            <span class="lb-score">${joueur.clicks.toLocaleString()}</span>
          </div>
        `
      }).join("")
    }

    async function load() {
      const { data: { user } } = await sb.auth.getUser()
      if (!user) { window.location.href = "index.html"; return }
      userId = user.id

      const { data } = await sb
        .from("player_scores")
        .select("clicks, total_clicks_ever, username")
        .eq("user_id", userId)
        .single()

      if (!data) {
        const urlParams = new URLSearchParams(window.location.search)
        const pseudoFromUrl = urlParams.get('pseudo')
        const defaultName = pseudoFromUrl || user.email.split("@")[0]

        await sb.from("player_scores").insert({
          user_id: userId,
          clicks: 0,
          total_clicks_ever: 0,
          username: defaultName
        })
        clicks = 0
        totalEver = 0
        username = defaultName
      } else {
        clicks = data.clicks || 0
        totalEver = data.total_clicks_ever || 0
        username = data.username || 'Player'
      }

      document.getElementById("profileName").textContent = username
      document.getElementById("headerUsername").textContent = username
      updateDisplay()

      const fill = document.getElementById("liquidFill")
      fill.style.transition = "none"
      fill.style.height = "110%"
    }

    async function saveScore() {
      if (!userId) return
      await sb
        .from("player_scores")
        .update({
          clicks: clicks,
          total_clicks_ever: totalEver,
          updated_at: new Date()
        })
        .eq("user_id", userId)
    }

    document.getElementById("clickBtn").onclick = function () {
      if (onCooldown) return
      clicks++
      totalEver++
      updateDisplay()
      startCooldown()
      if (saveTimeout) clearTimeout(saveTimeout)
      saveTimeout = setTimeout(saveScore, 2000)
    }

    document.getElementById("profileBtn").onclick = () => {
      document.getElementById("profileMenu").classList.toggle("hidden")
      document.getElementById("leaderboardMenu").classList.add("hidden")
    }

    document.getElementById("leaderboardBtn").onclick = () => {
      const menu = document.getElementById("leaderboardMenu")
      menu.classList.toggle("hidden")
      document.getElementById("profileMenu").classList.add("hidden")
      if (!menu.classList.contains("hidden")) loadLeaderboard()
    }

    document.getElementById("logoutMenu").onclick = async function () {
      await saveScore()
      await sb.auth.signOut()
      location.href = "index.html"
    }

    window.addEventListener("beforeunload", saveScore)
    load()
  </script>
</body>
</html>
