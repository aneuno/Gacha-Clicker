<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gacha Clicker - Jeu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-6">
  <h1 class="text-4xl font-bold text-center mb-8">Gacha Clicker</h1>

  <!-- Bouton Profil -->
  <div class="absolute top-6 right-6">
    <button id="profileBtn" class="bg-gray-700 px-4 py-2 rounded hover:bg-gray-600">👤 Profil</button>
    <div id="profileMenu" class="hidden bg-gray-800 p-4 rounded shadow-lg mt-2 text-white w-56">
      <p class="text-lg font-bold mb-2">👤 <span id="profileName">...</span></p>
      <hr class="border-gray-600 mb-2">
      <p class="text-sm text-gray-400">Score actuel</p>
      <p class="text-xl font-bold mb-2"><span id="profileScore">0</span> clics</p>
      <p class="text-sm text-gray-400">Total depuis le début</p>
      <p class="text-xl font-bold text-yellow-400 mb-4"><span id="profileTotal">0</span> clics</p>
      <button id="logoutMenu" class="w-full py-2 bg-red-600 rounded hover:bg-red-700">Déconnexion</button>
    </div>
  </div>

  <div class="max-w-md mx-auto bg-gray-800 p-8 rounded-xl">
    <p id="welcome" class="text-xl mb-6 text-center">Chargement...</p>
    <div class="text-2xl mb-1">Score : <span id="score">0</span></div>
    <div class="text-sm text-yellow-400 mb-6">Total all-time : <span id="totalEver">0</span> clics</div>
    <button id="clickBtn" class="w-full py-6 bg-purple-700 rounded-xl text-3xl font-bold mb-6 hover:bg-purple-600">Clique.</button>
    <button id="logout" class="w-full py-3 bg-red-600 rounded hover:bg-red-700">Déconnexion</button>
  </div>

  <script>
    const sb = supabase.createClient(
      'https://zbyvhlhnjefpodjdnfdy.supabase.co',
      'sb_publishable_6rBnjr2X1LV9wGTNkVl6jQ_XxHENZ-l'
    )

    let clicks = 0
    let totalEver = 0
    let username = 'Joueur'
    let userId = null
    let saveTimeout = null

    function updateDisplay() {
      document.getElementById("score").textContent = clicks
      document.getElementById("totalEver").textContent = totalEver
      document.getElementById("profileScore").textContent = clicks
      document.getElementById("profileTotal").textContent = totalEver
    }

    async function load() {
      const { data: { user } } = await sb.auth.getUser()
      if (!user) { window.location.href = "index.html"; return }
      userId = user.id

      const { data } = await sb
        .from("player_scores")
        .select("clicks, total_clicks_ever, username")
        .eq("user_id", userId)
        .single()

      if (!data) {
        // Récupère l'email pour générer un username par défaut
        const defaultName = user.email.split("@")[0]
        await sb.from("player_scores").insert({
          user_id: userId,
          clicks: 0,
          total_clicks_ever: 0,
          username: defaultName
        })
        clicks = 0
        totalEver = 0
        username = defaultName
      } else {
        clicks = data.clicks || 0
        totalEver = data.total_clicks_ever || 0
        username = data.username || 'Joueur'
      }

      document.getElementById("welcome").textContent = `Salut ${username} !`
      document.getElementById("profileName").textContent = username
      updateDisplay()
    }

    async function saveScore() {
      if (!userId) return
      await sb
        .from("player_scores")
        .update({
          clicks: clicks,
          total_clicks_ever: totalEver,
          updated_at: new Date()
        })
        .eq("user_id", userId)
    }

    document.getElementById("clickBtn").onclick = function () {
      clicks++
      totalEver++  // S'incrémente aussi, ne redescend jamais
      updateDisplay()
      if (saveTimeout) clearTimeout(saveTimeout)
      saveTimeout = setTimeout(saveScore, 2000)
    }

    document.getElementById("profileBtn").onclick = () => {
      document.getElementById("profileMenu").classList.toggle("hidden")
    }

    async function logout() {
      await saveScore()
      await sb.auth.signOut()
      location.href = "index.html"
    }

    document.getElementById("logout").onclick = logout
    document.getElementById("logoutMenu").onclick = logout
    window.addEventListener("beforeunload", saveScore)

    load()
  </script>
</body>
</html>
