<script>

const supabaseClient = supabase.createClient(
'https://zbyvhlhnjefpodjdnfdy.supabase.co',
'sb_publishable_6rBnjr2X1LV9wGTNkVl6jQ_XxHENZ-l'
)

let clicks = 0
let userId = null

async function load(){

const { data } = await supabaseClient.auth.getUser()
const user = data?.user

if(!user){
window.location.href = "index.html"
return
}

userId = user.id

const { data: profile } = await supabaseClient
.from("profiles")
.select("pseudo, score")
.eq("user_id", user.id)
.single()

document.getElementById("welcome").textContent =
`Salut ${profile?.pseudo || "Joueur"} !`

clicks = profile?.score || 0
document.getElementById("score").textContent = clicks

}

document.getElementById("click").onclick = async function(){

clicks++
document.getElementById("score").textContent = clicks

await supabaseClient
.from("profiles")
.update({ score: clicks })
.eq("user_id", userId)

}

document.getElementById("logout").onclick = function(){
supabaseClient.auth.signOut()
.then(()=> location.href="index.html")
}

load()

</script>
