<script type="module">
  // Import moderne via esm.sh (plus fiable que jsdelivr pour ESM en browser en 2026)
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

  const supabase = createClient(
    'https://zbyvhlhnjefpodjdnfdy.supabase.co',
    'sb_publishable_6rBnjr2X1LV9wGTNkVl6jQ_XxHENZ-l'
  )

  let clicks = 0
  let totalScore = 0
  let lastSavedClicks = 0
  let userId = null
  let saveTimeout = null

  // ────────────────────────────────────────────────
  // FONCTION DE CHARGEMENT (avec try/catch pour debug)
  // ────────────────────────────────────────────────
  async function load() {
    try {
      console.log("Début du chargement...")

      const { data: { user }, error: authError } = await supabase.auth.getUser()
      
      if (authError || !user) {
        console.log("Pas d'utilisateur → redirection")
        window.location.href = "index.html"
        return
      }

      userId = user.id
      console.log("Utilisateur trouvé :", user.id)

      // Récupération progression
      const { data: progress, error } = await supabase
        .from("player_progress")
        .select("click_count, total_score")
        .eq("user_id", userId)
        .maybeSingle()

      let pseudo = user.user_metadata?.pseudo || user.email?.split('@')[0] || "Joueur"

      if (error) {
        console.error("Erreur lecture progression :", error)
        document.getElementById("welcome").textContent = "Erreur de chargement..."
        return
      }

      if (!progress) {
        console.log("Pas de progression → création")
        const { error: insertError } = await supabase
          .from("player_progress")
          .insert({
            user_id: userId,
            click_count: 0,
            total_score: 0,
            last_click: new Date().toISOString(),
            updated_at: new Date().toISOString()
          })

        if (insertError) throw insertError

        clicks = 0
        totalScore = 0
      } else {
        clicks = Number(progress.click_count) || 0
        totalScore = Number(progress.total_score) || 0
      }

      lastSavedClicks = clicks

      // Mise à jour affichage
      document.getElementById("score").textContent = clicks
      document.getElementById("profileScore").textContent = clicks
      document.getElementById("welcome").textContent = `Salut ${pseudo} !`
      console.log("Chargement terminé OK")

    } catch (err) {
      console.error("ERREUR FATALE dans load() :", err)
      document.body.innerHTML += `<p style="color:red; text-align:center;">Erreur : ${err.message || 'inconnue'}</p>`
    }
  }

  // ────────────────────────────────────────────────
  // ÉVÉNEMENTS
  // ────────────────────────────────────────────────
  document.getElementById("profileBtn")?.addEventListener("click", () => {
    document.getElementById("profileMenu").classList.toggle("hidden")
  })

  const logout = async () => {
    await supabase.auth.signOut()
    window.location.href = "index.html"
  }

  document.getElementById("logoutMenu")?.addEventListener("click", logout)
  document.getElementById("logout")?.addEventListener("click", logout)

  // ────────────────────────────────────────────────
  // SAUVEGARDE
  // ────────────────────────────────────────────────
  async function saveProgress() {
    if (clicks === lastSavedClicks) return

    const delta = clicks - lastSavedClicks
    totalScore += delta

    try {
      const { error } = await supabase
        .from("player_progress")
        .update({
          click_count: clicks,
          total_score: totalScore,
          last_click: new Date().toISOString(),
          updated_at: new Date().toISOString()
        })
        .eq("user_id", userId)

      if (error) throw error

      lastSavedClicks = clicks
      console.log("Sauvegarde OK")
    } catch (err) {
      console.error("Erreur sauvegarde :", err)
    }
  }

  document.getElementById("click")?.addEventListener("click", () => {
    clicks++
    document.getElementById("score").textContent = clicks
    document.getElementById("profileScore").textContent = clicks

    clearTimeout(saveTimeout)
    saveTimeout = setTimeout(saveProgress, 1800)
  })

  // Sauvegarde sécurité
  setInterval(saveProgress, 7000)

  window.addEventListener('beforeunload', () => {
    if (clicks !== lastSavedClicks) saveProgress()
  })

  // Lancement
  load()
</script>
