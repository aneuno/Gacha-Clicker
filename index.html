<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gacha Clicker - Connexion</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">

  <div class="w-full max-w-sm p-8 bg-gray-800 rounded-xl shadow-lg">

    <h1 class="text-3xl font-bold text-center mb-6">Gacha Clicker</h1>

    <!-- Formulaire connexion -->
    <form id="login-form" class="space-y-4">
      <input id="email" type="email" placeholder="Email" required class="w-full p-3 bg-gray-700 rounded">
      <input id="password" type="password" placeholder="Mot de passe" required class="w-full p-3 bg-gray-700 rounded">
      <button type="submit" class="w-full p-3 bg-blue-600 rounded font-bold hover:bg-blue-700">Se connecter</button>
    </form>

    <div class="text-center my-4">ou</div>

    <!-- Formulaire inscription -->
    <form id="signup-form" class="space-y-4 hidden">
      <input id="pseudo" type="text" placeholder="Pseudo" required class="w-full p-3 bg-gray-700 rounded">
      <input id="signup-email" type="email" placeholder="Email" required class="w-full p-3 bg-gray-700 rounded">
      <input id="signup-password" type="password" placeholder="Mot de passe" required class="w-full p-3 bg-gray-700 rounded">
      <button type="submit" class="w-full p-3 bg-green-600 rounded font-bold hover:bg-green-700">Créer un compte</button>
    </form>

    <button id="toggle-btn" class="w-full mt-4 text-blue-400">Pas de compte ? Inscris-toi</button>

    <p id="message" class="text-center mt-4 text-red-400 min-h-[1.5rem]"></p>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const supabase = createClient(
      'https://xxxxxxxxxxxxxxxx.supabase.co',  // ← TON URL Supabase
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4eHh4eHh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MjU5NzEyMzQsImV4cCI6MjA0MTU0NzIzNH0.xxxxxxxxxxxxxxxxxxxxxxxxxxxxx'  // ← TA CLÉ ANON
    )

    const loginForm = document.getElementById('login-form')
    const signupForm = document.getElementById('signup-form')
    const toggleBtn = document.getElementById('toggle-btn')
    const message = document.getElementById('message')

    toggleBtn.onclick = () => {
      loginForm.classList.toggle('hidden')
      signupForm.classList.toggle('hidden')
      toggleBtn.textContent = loginForm.classList.contains('hidden') 
        ? "Déjà un compte ? Connecte-toi" 
        : "Pas de compte ? Inscris-toi"
    }

    loginForm.onsubmit = async e => {
      e.preventDefault()
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value

      const { error } = await supabase.auth.signInWithPassword({ email, password })
      if (error) return message.textContent = error.message
      window.location.href = 'game.html'
    }

    signupForm.onsubmit = async e => {
      e.preventDefault()
      const pseudo = document.getElementById('pseudo').value.trim()
      const email = document.getElementById('signup-email').value
      const password = document.getElementById('signup-password').value

      const { error } = await supabase.auth.signUp({
        email, password,
        options: { data: { pseudo } }
      })

      if (error) return message.textContent = error.message
      message.textContent = "Compte créé ! Tu peux te connecter."
      toggleBtn.click()  // repasse sur connexion
    }

    // Si déjà connecté → direct au jeu
    supabase.auth.getUser().then(({ data }) => {
      if (data.user) window.location.href = 'game.html'
    })
  </script>
</body>
</html>
