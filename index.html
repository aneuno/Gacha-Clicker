<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Compte Gacha</title>
</head>
<body>

<h2>Créer un compte</h2>
<form id="formCreate">
  <input type="text" id="pseudo" placeholder="Pseudo" required>
  <input type="password" id="password" placeholder="Mot de passe" required>
  <button type="submit">Créer le compte</button>
</form>

<h2>Connexion</h2>
<form id="formLogin">
  <input type="text" id="loginPseudo" placeholder="Pseudo" required>
  <input type="password" id="loginPassword" placeholder="Mot de passe" required>
  <button type="submit">Connexion</button>
</form>

<div id="menu" style="display:none;">
  <h2>fonctionable</h2>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
  // 🔹 Initialisation Supabase
  const supabaseUrl = 'https://zbyvhlhnjefpodjdnfdy.supabase.co';
  const supabaseKey = 'sb_publishable_6rBnjr2X1LV9wGTNkVl6jQ_XxHENZ-l';
  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  // 🔹 Regex mot de passe
  const passwordRegex = /^(?=.*[A-Za-z])(?=.*[!@#$%^&*]).{6,}$/;

  // 🔹 Création de compte
  document.getElementById('formCreate').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pseudo = document.getElementById('pseudo').value.trim();
    const password = document.getElementById('password').value;

    // Vérifie mot de passe
    if(!passwordRegex.test(password)) {
      alert('Mot de passe invalide : min 6 caractères, 1 lettre et 1 caractère spécial');
      return;
    }

    // Vérifie si pseudo existe déjà
    const { data: existing, error: err1 } = await supabase
      .from('users')
      .select('pseudo')
      .eq('pseudo', pseudo)
      .single();

    if(existing) {
      alert('Pseudo déjà utilisé !');
      return;
    }

    // Crée le compte
    const { data, error } = await supabase
      .from('users')
      .insert([{ pseudo: pseudo, password: password, score: 0 }]);

    if(error) alert('Erreur : ' + error.message);
    else alert('Compte créé avec succès !');
  });

  // 🔹 Connexion
  document.getElementById('formLogin').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pseudo = document.getElementById('loginPseudo').value.trim();
    const password = document.getElementById('loginPassword').value;

    const { data, error } = await supabase
      .from('users')
      .select('*')
      .eq('pseudo', pseudo)
      .single();

    if(error || !data) {
      alert('Utilisateur non trouvé');
      return;
    }

    if(data.password !== password) {
      alert('Mot de passe incorrect');
      return;
    }

    // Affiche le menu simple
    document.getElementById('formCreate').style.display = 'none';
    document.getElementById('formLogin').style.display = 'none';
    document.getElementById('menu').style.display = 'block';
  });

</script>

</body>
</html>
