<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test Supabase Compte</title>
</head>
<body>

<h2>Créer un compte</h2>
<form id="formCreate">
  <input type="text" id="pseudo" placeholder="Pseudo" required>
  <input type="password" id="password" placeholder="Mot de passe" required>
  <button type="submit">Créer le compte</button>
</form>

<h2>Connexion</h2>
<form id="formLogin">
  <input type="text" id="loginPseudo" placeholder="Pseudo" required>
  <input type="password" id="loginPassword" placeholder="Mot de passe" required>
  <button type="submit">Connexion</button>
</form>

<div id="menu" style="display:none;">
  <h2>fonctionable</h2>
</div>

<p id="message" style="color:red;"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
  const supabaseUrl = 'https://zbyvhlhnjefpodjdnfdy.supabase.co';
  const supabaseKey = 'sb_publishable_6rBnjr2X1LV9wGTNkVl6jQ_XxHENZ-l';
  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  const messageEl = document.getElementById('message');

  const passwordRegex = /^(?=.*[A-Za-z])(?=.*[!@#$%^&*]).{6,}$/;

  // Création compte
  document.getElementById('formCreate').addEventListener('submit', async (e) => {
    e.preventDefault();
    messageEl.textContent = '';

    const pseudo = document.getElementById('pseudo').value.trim();
    const password = document.getElementById('password').value;

    if(!passwordRegex.test(password)) {
      messageEl.textContent = 'Mot de passe invalide : min 6 caractères, 1 lettre, 1 caractère spécial';
      return;
    }

    // Vérifie si pseudo existe
    const { data: existing, error: err1 } = await supabase
      .from('users')
      .select('pseudo')
      .eq('pseudo', pseudo)
      .single();

    if(existing) {
      messageEl.textContent = 'Pseudo déjà utilisé !';
      return;
    }

    const { data, error } = await supabase
      .from('users')
      .insert([{ pseudo: pseudo, password: password, score: 0 }]);

    if(error) {
      messageEl.textContent = 'Erreur création compte : ' + error.message;
    } else {
      messageEl.style.color = 'green';
      messageEl.textContent = 'Compte créé avec succès ! Vous pouvez maintenant vous connecter.';
    }
  });

  // Connexion
  document.getElementById('formLogin').addEventListener('submit', async (e) => {
    e.preventDefault();
    messageEl.textContent = '';

    const pseudo = document.getElementById('loginPseudo').value.trim();
    const password = document.getElementById('loginPassword').value;

    const { data, error } = await supabase
      .from('users')
      .select('*')
      .eq('pseudo', pseudo)
      .single();

    if(error || !data) {
      messageEl.textContent = 'Utilisateur non trouvé';
      return;
    }

    if(data.password !== password) {
      messageEl.textContent = 'Mot de passe incorrect';
      return;
    }

    document.getElementById('formCreate').style.display = 'none';
    document.getElementById('formLogin').style.display = 'none';
    document.getElementById('menu').style.display = 'block';
  });

</script>
</body>
</html>
